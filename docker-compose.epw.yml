services:
  nettu-scheduler:
    image: fmeringdal/nettu-scheduler:0.6.0
    container_name: epw-nettu-scheduler
    restart: unless-stopped
    ports:
      - "5008:5000"
    env_file:
      - .env.nettu
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
